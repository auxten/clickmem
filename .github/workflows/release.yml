name: release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: build + publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC)
      contents: write   # commit version bump back to main + create GitHub Release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to switch to main and push

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Build dashboard
        working-directory: src/clickmem/dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling

      - name: Set package version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing version ${VERSION}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build wheel + sdist (dashboard/dist is prebuilt above)
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            --title "ClickMem ${VERSION}" \
            ./dist/*

      - name: Commit version bump back to main
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          if [ -n "$(git status --porcelain pyproject.toml)" ]; then
            git add pyproject.toml
            git commit -m "release: bump version to ${VERSION}"
            git push origin main
          else
            echo "pyproject.toml already at ${VERSION} on main; skipping commit"
          fi
